<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Meri Dukaan — V5 Premium</title>

    <!-- SEO & Meta -->
    <meta name="description" content="Meri Dukaan V5 Premium — World Class Business Manager">
    <meta name="theme-color" content="#121217">
    <link rel="manifest" href="manifest.json">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons (Premium Vector Icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase v10 (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- External Libraries (Deferred for speed) -->
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splashScreen" class="screen splash-screen active">
    <div class="splash-content">
        <div class="splash-icon-wrap">
            <i data-lucide="store" class="splash-icon"></i>
        </div>
        <h1 class="splash-title">Meri Dukaan</h1>
        <p class="splash-sub">Premium V5</p>
        <div class="splash-loader"><div class="splash-bar"></div></div>
    </div>
</div>

<!-- GOOGLE LOGIN -->
<div id="loginScreen" class="screen login-screen">
    <div class="login-card">
        <i data-lucide="shield-check" class="login-top-icon"></i>
        <h2>Welcome to V5</h2>
        <p>Enterprise Grade Security & Sync</p>
        <button class="google-btn" id="googleBtn" onclick="googleSignIn()">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Continue with Google</span>
        </button>
    </div>
</div>

<!-- PIN SCREENS (Simplified structure, logic handled in JS) -->
<div id="pinLoginScreen" class="screen pin-screen">
    <div class="pin-card">
        <i data-lucide="lock" class="pin-ic"></i>
        <h2>Enter PIN</h2>
        <div class="pin-user" id="pinUserInfo"></div>
        <div class="pin-dots" id="loginDots"><i></i><i></i><i></i><i></i></div>
        <div class="pin-err" id="loginErr"></div>
        <div class="pin-pad" id="loginPad"></div>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboardScreen" class="screen">
    <div class="dash-hdr">
        <div class="dh-top">
            <div>
                <p class="dh-greet" id="dashGreeting"></p>
                <h1 class="dh-title">Meri Dukaan</h1>
                <p class="dh-date" id="todayDate"></p>
            </div>
            <div class="dh-actions">
                <button class="dh-icon-btn" onclick="cycleTheme()"><i data-lucide="moon"></i></button>
                <button class="dh-icon-btn" onclick="lockApp()"><i data-lucide="lock-keyhole"></i></button>
            </div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-c"><i data-lucide="pie-chart" class="sc-ic sc1"></i><div class="sc-info"><small>Sales</small><strong id="dRoti">0</strong></div></div>
            <div class="stat-c"><i data-lucide="indian-rupee" class="sc-ic sc2"></i><div class="sc-info"><small>Income</small><strong id="dIncome">₹0</strong></div></div>
            <div class="stat-c"><i data-lucide="shopping-cart" class="sc-ic sc3"></i><div class="sc-info"><small>Expense</small><strong id="dExpense">₹0</strong></div></div>
            <div class="stat-c"><i data-lucide="trending-up" class="sc-ic sc4"></i><div class="sc-info"><small>Profit</small><strong id="dProfit" class="green">₹0</strong></div></div>
        </div>
        <div class="dash-strip-row">
            <div class="udh-strip" onclick="goTo('creditScreen')"><span><i data-lucide="credit-card"></i> Credit Pending</span><strong id="dCredit">₹0</strong></div>
        </div>
    </div>

    <div class="dash-body">
        <h3 class="sec-t">Quick Actions</h3>
        <div class="act-grid">
            <button class="act-btn" onclick="goTo('quickSaleScreen')"><div class="ab-i ab-quick"><i data-lucide="zap"></i></div><span>Quick Sale</span></button>
            <button class="act-btn" onclick="goTo('salesScreen')"><div class="ab-i ab1"><i data-lucide="receipt"></i></div><span>Sales</span></button>
            <button class="act-btn" onclick="goTo('expenseScreen')"><div class="ab-i ab2"><i data-lucide="shopping-bag"></i></div><span>Expense</span></button>
            <button class="act-btn" onclick="goTo('customerScreen')"><div class="ab-i ab3"><i data-lucide="users"></i></div><span>Customers</span></button>
            <button class="act-btn" onclick="goTo('reportScreen')"><div class="ab-i ab5"><i data-lucide="bar-chart-2"></i></div><span>Reports</span></button>
            <button class="act-btn" onclick="goTo('settingScreen')"><div class="ab-i ab6"><i data-lucide="settings"></i></div><span>Settings</span></button>
        </div>
    </div>
</div>

<!-- REPORTS SCREEN (With PDF Template Div) -->
<div id="reportScreen" class="screen">
    <div class="pg-top">
        <button class="pg-back" onclick="goTo('dashboardScreen')"><i data-lucide="chevron-left"></i></button>
        <h2>Financial Reports</h2>
        <div></div>
    </div>
    
    <!-- Unified Chart Area -->
    <div class="chart-section" id="chartSection">
        <div class="chart-card">
            <h4 class="chart-title">Cashflow Overview</h4>
            <div class="chart-wrap"><canvas id="unifiedChart"></canvas></div>
        </div>
    </div>

    <div class="pdf-wrap">
        <button class="pdf-btn" onclick="generatePremiumPDF()"><i data-lucide="download-cloud"></i> Generate Professional PDF</button>
    </div>

    <!-- Hidden Template for HTML2Canvas PDF Engine -->
    <div id="pdfReportTemplate" style="position: absolute; left: -9999px; width: 800px; background: #fff; padding: 40px; color: #121217; font-family: 'Inter', sans-serif;">
        <!-- JS will inject premium design here -->
    </div>
</div>

<!-- NEW AIRBNB STYLE DATE PICKER -->
<div id="datePickerSheet" class="bts bts-blur">
    <div class="bts-overlay" onclick="closeDatePicker()"></div>
    <div class="bts-panel">
        <div class="bts-handle"></div>
        <div class="bts-hdr">
            <h3>Select Date</h3>
            <button class="bts-close" onclick="closeDatePicker()"><i data-lucide="x"></i></button>
        </div>
        <div class="dp-cal">
            <div class="dp-nav">
                <button class="dp-nav-btn" onclick="dpMonth(-1)"><i data-lucide="chevron-left"></i></button>
                <span class="dp-month" id="dpMonthLabel"></span>
                <button class="dp-nav-btn" onclick="dpMonth(1)"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="dp-weekdays"><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span></div>
            <div class="dp-days" id="dpDays"></div>
        </div>
    </div>
</div>

<!-- TOAST & OFFLINE BANNER -->
<div id="toast" class="toast"></div>
<div id="offlineBanner" class="offline-banner" style="display:none">
    <i data-lucide="wifi-off"></i><span>You're offline — Working from local cache</span>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav" id="bottomNav">
    <button class="bn-i active" onclick="goTo('dashboardScreen')"><i data-lucide="home"></i><span>Home</span></button>
    <button class="bn-i" onclick="goTo('quickSaleScreen')"><i data-lucide="zap"></i><span>Quick</span></button>
    <button class="bn-i" onclick="goTo('salesScreen')"><i data-lucide="receipt"></i><span>Sales</span></button>
    <button class="bn-i" onclick="goTo('expenseScreen')"><i data-lucide="shopping-bag"></i><span>Expenses</span></button>
    <button class="bn-i" onclick="goTo('creditScreen')"><i data-lucide="credit-card"></i><span>Credit</span></button>
</nav>

<!-- MODULAR JS FILES IMPORTS -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/features/sales.js"></script>
<script src="js/features/expenses.js"></script>
<script src="js/features/customers.js"></script>
<script src="js/features/reports.js"></script>
<script src="js/app.js"></script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => {
        console.log('[SW] V5.0 Registered Successfully');
    });
}
</script>

<!-- Initialize Lucide Icons -->
<script>
    lucide.createIcons();
</script>
</body>
</html>
